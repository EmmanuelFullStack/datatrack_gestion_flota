<div class="page-container">
  <div class="page-header">
    <div>
      <h1 class="premium-title"><mat-icon>route</mat-icon> Rutas de Transporte</h1>
      <p class="premium-subtitle">Administra y optimiza tus recorridos viales mediante Dijkstra</p>
    </div>
    <button mat-raised-button color="primary" class="premium-btn" (click)="createRoute()">
      <mat-icon>add_road</mat-icon> Nueva Ruta
    </button>
  </div>

  <mat-card class="premium-card legacy-glass">
    <mat-card-content>
      <div class="table-container" [class.loading]="loading">
        <div class="loading-overlay" *ngIf="loading">
          <mat-spinner diameter="40"></mat-spinner>
        </div>

        <table mat-table [dataSource]="routes">
          <!-- Nombre Column -->
          <ng-container matColumnDef="nombre">
            <th mat-header-cell *matHeaderCellDef>Ruta</th>
            <td mat-cell *matCellDef="let r">
              <div class="route-info">
                <span class="route-name">{{r.nombre}}</span>
              </div>
            </td>
          </ng-container>

          <!-- Origen Column -->
          <ng-container matColumnDef="origen">
            <th mat-header-cell *matHeaderCellDef>Origen</th>
            <td mat-cell *matCellDef="let r">
              <span class="coord-label">{{r.origen}}</span>
            </td>
          </ng-container>

          <!-- Destino Column -->
          <ng-container matColumnDef="destino">
            <th mat-header-cell *matHeaderCellDef>Último Destino</th>
            <td mat-cell *matCellDef="let r">
              <span class="coord-label">{{r.destino}}</span>
            </td>
          </ng-container>

          <!-- Capacidad Column -->
          <ng-container matColumnDef="capacidad">
            <th mat-header-cell *matHeaderCellDef>Capacidad</th>
            <td mat-cell *matCellDef="let r">
              <mat-chip-set>
                <mat-chip>{{r.capacidadMaxima}} pax</mat-chip>
              </mat-chip-set>
            </td>
          </ng-container>

          <!-- Estado Column -->
          <ng-container matColumnDef="estado">
            <th mat-header-cell *matHeaderCellDef>Estado</th>
            <td mat-cell *matCellDef="let r">
              <span class="status-badge" [ngClass]="r.estado.toLowerCase()">
                {{r.estado}}
              </span>
            </td>
          </ng-container>

          <!-- Acciones Column -->
          <ng-container matColumnDef="acciones">
            <th mat-header-cell *matHeaderCellDef></th>
            <td mat-cell *matCellDef="let r">
              <div class="action-buttons" style="display:flex;gap:4px">
                <button mat-icon-button color="primary" matTooltip="Editar Ruta" (click)="editRoute(r.id)">
                  <mat-icon>edit</mat-icon>
                </button>
                <button mat-icon-button color="warn" matTooltip="Eliminar" (click)="deleteRoute(r, $event)">
                  <mat-icon>delete_outline</mat-icon>
                </button>
              </div>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>

        <!-- Empty State -->
        <div *ngIf="!loading && routes.length === 0" class="empty-state">
          <mat-icon style="font-size: 48px; width:48px; height:48px; margin-bottom: 16px;">map</mat-icon>
          <p>No se encontraron rutas registradas.</p>
          <button mat-flat-button color="primary" (click)="createRoute()">Crear Ruta Ahora</button>
        </div>
      </div>

      <mat-paginator [length]="total" 
                     [pageSize]="limit" 
                     [pageSizeOptions]="[5, 10, 25]"
                     (page)="onPageChange($event)" 
                     showFirstLastButtons>
      </mat-paginator>
    </mat-card-content>
  </mat-card>
</div>
